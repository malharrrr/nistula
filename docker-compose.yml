version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: nistula-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: nistula_db
    ports:
      - "5433:5432"  # (avoids my pc's conflict)
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql  
      - nistula_data:/var/lib/postgresql/data              
    restart: unless-stopped

  api:
    build: .
    container_name: nistula-api
    ports:
      - "8000:8000"
    env_file:
      - .env 
    environment:
      DATABASE_URL: postgresql://postgres:admin123@db:5432/nistula_db
    volumes:
      - ./app:/app/app  
    depends_on:
      - db  
    restart: unless-stopped

volumes:
  nistula_data: